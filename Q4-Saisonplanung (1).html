<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q4 Saisonplanung — BabybeFun</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0b0f1a; --surface:#111827; --surface2:#1a2235; --border:#1f2d45;
    --text:#e2e8f0; --muted:#4b5a72; --dim:#2a3a52;
    --green:#22c55e; --yellow:#f59e0b; --red:#ef4444;
    --blue:#3b82f6; --purple:#a78bfa; --orange:#f97316;
    --mono:'JetBrains Mono',monospace;
  }
  body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:28px 24px; }
  .header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; gap:16px; flex-wrap:wrap; }
  .header-left h1 { font-size:22px; font-weight:800; letter-spacing:-0.5px; color:#f8fafc; display:flex; align-items:center; gap:10px; }
  .header-left p { font-size:12px; color:var(--muted); margin-top:4px; }
  .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; transition:background 0.3s,box-shadow 0.3s; }
  .last-sync { font-size:11px; color:var(--muted); font-family:var(--mono); text-align:right; }
  .sync-btn { display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); color:#60a5fa; font-size:12px; font-weight:600; padding:7px 14px; border-radius:8px; cursor:pointer; transition:background 0.15s; margin-top:6px; }
  .sync-btn:hover { background:var(--dim); }
  .tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .tab { display:flex; align-items:center; gap:7px; padding:8px 16px; border-radius:8px; border:2px solid var(--border); background:var(--surface); color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; }
  .tab.active { border-color:var(--blue); background:#1e3a5f; color:#93c5fd; font-weight:700; }
  .tab-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .info-bar { display:flex; gap:0; background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:14px; overflow:hidden; flex-wrap:wrap; }
  .info-cell { padding:14px 20px; border-right:1px solid var(--border); flex:1; min-width:100px; }
  .info-cell:last-child { border-right:none; }
  .info-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:4px; }
  .info-value { font-size:20px; font-weight:800; color:#f8fafc; font-family:var(--mono); }
  .info-value.green { color:#86efac; font-size:14px; }
  .info-value.yellow { color:var(--yellow); }
  .mult-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:14px; }
  .mult-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .mult-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; }
  .reset-btn { font-size:11px; color:#60a5fa; background:none; border:none; cursor:pointer; font-family:inherit; }
  .mult-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
  .mult-col { text-align:center; }
  .mult-month-label { font-size:11px; font-weight:600; margin-bottom:6px; color:var(--muted); }
  .mult-month-label.q4 { color:var(--yellow); }
  .mult-input-wrap { position:relative; display:inline-block; }
  .mult-input { width:66px; padding:6px 20px 6px 8px; border:2px solid var(--border); border-radius:7px; font-size:14px; font-weight:700; font-family:var(--mono); color:var(--text); background:var(--bg); text-align:center; outline:none; transition:border-color 0.15s,background 0.15s; -moz-appearance:textfield; }
  .mult-input::-webkit-inner-spin-button,.mult-input::-webkit-outer-spin-button { -webkit-appearance:none; }
  .mult-input:focus { border-color:var(--blue); }
  .mult-input.hot { border-color:var(--orange); background:#1f0e00; color:#fed7aa; }
  .mult-x { position:absolute; right:6px; top:8px; font-size:10px; color:var(--muted); pointer-events:none; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:14px; }
  table { width:100%; border-collapse:collapse; }
  thead th { padding:10px 16px; font-size:10px; font-weight:700; color:var(--muted); text-align:left; text-transform:uppercase; letter-spacing:0.5px; background:var(--bg); border-bottom:1px solid var(--border); }
  tbody tr:nth-child(odd) { background:var(--surface); }
  tbody tr:nth-child(even) { background:var(--surface2); }
  tbody tr.oos-row { background:rgba(239,68,68,0.06) !important; }
  tbody td { padding:11px 16px; font-size:13px; border-bottom:1px solid var(--bg); font-family:var(--mono); }
  .q4-badge { display:inline-block; font-size:9px; font-weight:800; background:rgba(245,158,11,0.15); color:var(--yellow); padding:1px 6px; border-radius:3px; margin-left:6px; font-family:'Inter',sans-serif; }
  .mult-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-weight:700; font-size:13px; }
  .oos-badge { display:inline-block; font-size:9px; font-weight:800; background:rgba(239,68,68,0.2); color:var(--red); padding:1px 6px; border-radius:3px; margin-right:5px; font-family:'Inter',sans-serif; }
  .inbound-cell { color:#86efac; font-weight:600; }
  .neutral-cell { color:var(--dim); }
  .rec-box { border-radius:12px; padding:18px 20px; margin-bottom:14px; border:1px solid transparent; }
  .rec-box.oos { background:rgba(239,68,68,0.07); border-color:rgba(239,68,68,0.3); }
  .rec-box.warn { background:rgba(245,158,11,0.07); border-color:rgba(245,158,11,0.3); }
  .rec-box.ok { background:rgba(34,197,94,0.07); border-color:rgba(34,197,94,0.3); }
  .rec-title { font-size:13px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .rec-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; }
  .rec-card { background:var(--bg); border-radius:8px; padding:12px 14px; }
  .rec-card.highlight { background:#1e3a5f; border:2px solid rgba(59,130,246,0.5); }
  .rec-card.late { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.4); }
  .rec-card-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
  .rec-card-value { font-size:22px; font-weight:800; font-family:var(--mono); }
  .rec-card-sub { font-size:10px; color:var(--muted); margin-top:3px; }
  .loading { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:13px; padding:40px 0; justify-content:center; }
  .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-msg { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:16px 20px; color:#fca5a5; font-size:13px; margin:20px 0; }
  .footer-note { font-size:10px; color:var(--dim); text-align:center; margin-top:10px; font-family:var(--mono); }
  .pending-badge { display:inline-block; font-size:9px; font-weight:700; background:rgba(245,158,11,0.15); color:var(--yellow); padding:1px 5px; border-radius:3px; margin-left:4px; font-family:'Inter',sans-serif; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1><span class="status-dot" id="globalDot"></span>Q4 Saisonplanung 2026</h1>
    <p>Multiplikatoren einstellen — Bestand &amp; Bestellempfehlung live berechnet</p>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <div class="last-sync" id="lastSync">Lade Daten…</div>
    <button class="sync-btn" onclick="loadData()">↺ Neu laden</button>
  </div>
</div>

<div id="loadingDiv" class="loading"><div class="spinner"></div> Lade Bestandsplanung…</div>
<div id="errorDiv" class="error-msg" style="display:none"></div>
<div id="appDiv" style="display:none"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT7b-f5xjq59KXi6EdLbq6AFj7pVHt4fU2CMd6JuuovWBV5zQzTJReQif8tjcE1OlFd0QkN0jAL5v05/pub?gid=0&single=true&output=csv";
const SAFETY_DAYS = 30;
const MONTHS     = ["Jul","Aug","Sep","Okt","Nov","Dez"];
const MONTH_KEYS = ["jul","aug","sep","okt","nov","dez"];
const MONTH_DATES = [
  new Date("2026-07-01"),new Date("2026-08-01"),new Date("2026-09-01"),
  new Date("2026-10-01"),new Date("2026-11-01"),new Date("2026-12-01"),
];
const TODAY = new Date("2026-06-23");

const DEFAULT_MULTS = {
  krabbelmatte:{ jul:1.0, aug:1.0, sep:1.0, okt:1.2, nov:1.7, dez:2.0 },
  kopfkissen:  { jul:1.0, aug:1.0, sep:1.0, okt:1.0, nov:2.0, dez:2.0 },
  lernturm:    { jul:1.2, aug:1.5, sep:1.8, okt:2.0, nov:2.7, dez:2.7 },
  babywanne:   { jul:1.0, aug:1.0, sep:1.0, okt:1.2, nov:1.5, dez:1.5 },
};

const PRODUCT_DEFS = [
  { id:"krabbelmatte", label:"Krabbelmatte",    keyword:"Krabbelmatte Parent", deliveryDays:95,  vpe:1 },
  { id:"kopfkissen",   label:"Kopfkissen 40x80",keyword:"Kopfkissen 40x80",   deliveryDays:130, vpe:9 },
  { id:"lernturm",     label:"Lernturm",         keyword:"Lernturm Parent",    deliveryDays:120, vpe:1 },
  { id:"babywanne",    label:"Babywanne",         keyword:"Babywanne Parent",   deliveryDays:100, vpe:8 },
];

let products    = [];
let multipliers = {};
let activeId    = "krabbelmatte";

function parseCSVLine(line) {
  const result=[]; let cur=""; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur="";}
    else{cur+=c;}
  }
  result.push(cur.trim());
  return result;
}

function parseNum(s) {
  if(!s)return 0;
  // Remove quotes, dots as thousand separators, replace comma with dot
  return parseFloat(s.replace(/"/g,'').replace(/\./g,'').replace(',','.')) || 0;
}

function parseDate(s) {
  if(!s||s.length<8)return null;
  const parts=s.split('.');
  if(parts.length===3){
    const d=new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`);
    return isNaN(d)?null:d;
  }
  return null;
}

// Convert ETA to month index (0=Jul, 1=Aug, ... 5=Dez)
// If ETA is in the past or before July, treat as arriving in July (idx=0)
function etaToMonthIdx(etaStr) {
  const d = parseDate(etaStr);
  if(!d) return null;
  const base = new Date("2026-07-01");
  const diff = (d.getFullYear()-base.getFullYear())*12 + (d.getMonth()-base.getMonth());
  // If already past or before window → show in July (first available month)
  if(diff < 0) return 0;
  if(diff > 5) return null; // arrives after December, skip
  return diff;
}

function extractProducts(csvText) {
  const lines = csvText.split('\n');
  const rows  = lines.map(parseCSVLine);
  const result= [];

  // Column indices (0-based):
  // 0=Produkt, 1=Lagerbestand, 2=VK Geschwindigkeit
  // 13=Bestellnummer1, 14=Vorlauf/Qty1, 15=ETA1
  // 16=Bestellnummer2, 17=Vorlauf/Qty2, 18=ETA2
  const COL = { name:0, stock:1, vk:2, po1nr:13, po1qty:14, po1eta:15, po2nr:16, po2qty:17, po2eta:18 };

  for(const def of PRODUCT_DEFS){
    const row = rows.find(r => r[COL.name] && r[COL.name].trim()===def.keyword);
    if(!row){ console.warn("Not found:",def.keyword); continue; }

    const po1qty = parseNum(row[COL.po1qty]);
    const po2qty = parseNum(row[COL.po2qty]);
    const po1eta = row[COL.po1eta]?.trim()||null;
    const po2eta = row[COL.po2eta]?.trim()||null;
    const po1nr  = row[COL.po1nr]?.trim()||"PO1";
    const po2nr  = row[COL.po2nr]?.trim()||"PO2";

    // All POs in the sheet are treated as PENDING (not yet received)
    result.push({
      id:          def.id,
      label:       def.label,
      currentStock: parseNum(row[COL.stock]),
      baseVK:      parseNum(row[COL.vk]),
      deliveryDays: def.deliveryDays,
      vpe:         def.vpe,
      po1: po1qty>0 ? { nr:po1nr, qty:po1qty, eta:po1eta, monthIdx:etaToMonthIdx(po1eta) } : null,
      po2: po2qty>0 ? { nr:po2nr, qty:po2qty, eta:po2eta, monthIdx:etaToMonthIdx(po2eta) } : null,
    });
  }
  return result;
}

function calcFlow(p, mults) {
  let stock = p.currentStock;
  return MONTH_KEYS.map((mk,i) => {
    const mult   = mults[mk]??1.0;
    const sold   = Math.round(p.baseVK*mult*30);
    const start  = stock;
    let inbound  = 0;
    if(p.po1 && p.po1.monthIdx===i) inbound += p.po1.qty;
    if(p.po2 && p.po2.monthIdx===i) inbound += p.po2.qty;
    stock = stock + inbound - sold;
    return { month:MONTHS[i], mk, mult, sold, inbound, start, end:stock, oos:stock<0 };
  });
}

function calcRec(p, mults) {
  const rows        = calcFlow(p,mults);
  const safetyUnits = Math.round(p.baseVK*SAFETY_DAYS);
  const firstOOSIdx = rows.findIndex(r=>r.oos);
  const endStock    = rows[5].end;

  if(firstOOSIdx===-1 && endStock>=safetyUnits){
    return { needed:false, deficit:0, recommendation:0, safetyUnits, reason:"ok", endStock };
  }

  let deficit, arrivalBy, reason, firstOOSMonth=null;
  if(firstOOSIdx!==-1){
    const row      = rows[firstOOSIdx];
    const dailyRate= row.sold/30;
    const daysLeft = dailyRate>0 ? Math.floor(row.start/dailyRate) : 30;
    arrivalBy      = addDays(MONTH_DATES[firstOOSIdx], Math.max(0,daysLeft));
    deficit        = Math.abs(Math.min(...rows.map(r=>r.end)));
    reason         = "oos";
    firstOOSMonth  = MONTHS[firstOOSIdx];
  } else {
    arrivalBy = new Date("2026-12-31");
    deficit   = safetyUnits - endStock;
    reason    = "buffer";
  }

  const totalNeeded    = deficit + safetyUnits;
  const recommendation = Math.ceil(totalNeeded/p.vpe)*p.vpe;
  const orderBy        = addDays(arrivalBy, -p.deliveryDays);
  const alreadyLate    = orderBy < TODAY;

  return { needed:true, deficit, recommendation, safetyUnits, orderBy, arrivalBy, alreadyLate, reason, firstOOSMonth };
}

function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d){ if(!d)return"—"; return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function isPast(d){ return d&&d<TODAY; }

async function loadData() {
  document.getElementById("loadingDiv").style.display="flex";
  document.getElementById("appDiv").style.display="none";
  document.getElementById("errorDiv").style.display="none";
  document.getElementById("lastSync").textContent="Lade…";
  try {
    const res = await fetch(CSV_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    products = extractProducts(text);
    if(products.length===0) throw new Error("Keine Produkte gefunden — prüfe Spaltennamen im Sheet");
    for(const p of products){
      if(!multipliers[p.id]) multipliers[p.id]={...DEFAULT_MULTS[p.id]};
    }
    document.getElementById("lastSync").textContent="Sync: "+new Date().toLocaleTimeString("de-DE");
    document.getElementById("loadingDiv").style.display="none";
    document.getElementById("appDiv").style.display="block";
    render();
  } catch(e) {
    document.getElementById("loadingDiv").style.display="none";
    document.getElementById("errorDiv").style.display="block";
    document.getElementById("errorDiv").textContent="⚠ Fehler beim Laden: "+e.message;
  }
}

function render() {
  const app = document.getElementById("appDiv");
  const p   = products.find(x=>x.id===activeId);
  if(!p) return;

  const mults  = multipliers[p.id];
  const rows   = calcFlow(p,mults);
  const rec    = calcRec(p,mults);
  const hasOOS = rows.some(r=>r.oos);

  const q4Sold   = rows.slice(3).reduce((s,r)=>s+r.sold,0);
  const q4Normal = rows.slice(3).reduce((s,r)=>s+Math.round(p.baseVK*30),0);
  const q4Extra  = q4Sold-q4Normal;

  // Global dot
  const allOOS = products.some(pr=>calcFlow(pr,multipliers[pr.id]).some(r=>r.oos));
  const dot = document.getElementById("globalDot");
  dot.style.background = allOOS?"var(--red)":"var(--green)";
  dot.style.boxShadow  = allOOS?"0 0 10px var(--red)":"0 0 10px var(--green)";

  // PO cells — show pending badge if ETA is in the past
  let poCells="";
  if(p.po1){
    const etaD = parseDate(p.po1.eta);
    const late = etaD && isPast(etaD);
    poCells+=`<div class="info-cell">
      <div class="info-label">${p.po1.nr}${late?'<span class="pending-badge">verspätet</span>':''}</div>
      <div class="info-value green">+${p.po1.qty.toLocaleString("de-DE")} · ${p.po1.eta||"—"}${p.po1.monthIdx===0&&late?' → Jul':''}</div>
    </div>`;
  }
  if(p.po2){
    const etaD = parseDate(p.po2.eta);
    const late = etaD && isPast(etaD);
    poCells+=`<div class="info-cell">
      <div class="info-label">${p.po2.nr}${late?'<span class="pending-badge">verspätet</span>':''}</div>
      <div class="info-value green">+${p.po2.qty.toLocaleString("de-DE")} · ${p.po2.eta||"—"}</div>
    </div>`;
  }

  // Table
  const tableRows = rows.map((row,i)=>{
    const multColor = row.mult>1.5?"var(--orange)":row.mult>1.0?"var(--yellow)":"var(--muted)";
    const multBg    = row.mult>1.5?"rgba(249,115,22,0.12)":row.mult>1.0?"rgba(245,158,11,0.12)":"transparent";
    const endColor  = row.oos?"var(--red)":row.end<p.baseVK*30?"var(--orange)":"var(--green)";
    const oosBadge  = row.oos?`<span class="oos-badge">OOS</span>`:"";
    const q4Badge   = i>=3?`<span class="q4-badge">Q4</span>`:"";
    return `<tr class="${row.oos?'oos-row':''}">
      <td style="color:#f1f5f9;font-weight:600;font-family:'Inter',sans-serif">${row.month}${q4Badge}</td>
      <td><span class="mult-badge" style="color:${multColor};background:${multBg}">×${row.mult.toFixed(1)}</span></td>
      <td style="color:var(--text)">${row.sold.toLocaleString("de-DE")}</td>
      <td class="${row.inbound>0?'inbound-cell':'neutral-cell'}">${row.inbound>0?'+'+row.inbound.toLocaleString("de-DE"):'—'}</td>
      <td style="color:var(--muted)">${row.start.toLocaleString("de-DE")}</td>
      <td style="color:${endColor};font-weight:700">${oosBadge}${row.end.toLocaleString("de-DE")}</td>
    </tr>`;
  }).join("");

  // Recommendation
  let recHTML="";
  if(rec.needed){
    const cls   = hasOOS?"oos":"warn";
    const icon  = hasOOS?"🚨":"⚠️";
    const title = hasOOS?`OOS-Risiko in ${rec.firstOOSMonth} — Nachbestellung notwendig`:"Sicherheitspuffer zu knapp — Nachbestellung empfohlen";
    const titleColor = hasOOS?"#fca5a5":"#fcd34d";
    const lateCls   = rec.alreadyLate?"late":"";
    const lateLabel = rec.alreadyLate?"⚡ Hätte bestellt werden müssen":"Spätestes Bestelldatum";
    const lateColor = rec.alreadyLate?"var(--red)":"var(--purple)";
    recHTML=`<div class="rec-box ${cls}">
      <div class="rec-title" style="color:${titleColor}">${icon} ${title}</div>
      <div class="rec-grid">
        <div class="rec-card">
          <div class="rec-card-label">Fehlende Units</div>
          <div class="rec-card-value" style="color:var(--red)">${rec.deficit.toLocaleString("de-DE")}</div>
        </div>
        <div class="rec-card">
          <div class="rec-card-label">+ ${SAFETY_DAYS}T Puffer</div>
          <div class="rec-card-value" style="color:var(--yellow)">${rec.safetyUnits.toLocaleString("de-DE")}</div>
        </div>
        <div class="rec-card highlight">
          <div class="rec-card-label" style="color:#60a5fa">Bestellmenge</div>
          <div class="rec-card-value" style="color:#93c5fd">${rec.recommendation.toLocaleString("de-DE")}</div>
          <div class="rec-card-sub">VPE ${p.vpe} berücksichtigt</div>
        </div>
        <div class="rec-card ${lateCls}">
          <div class="rec-card-label">${lateLabel}</div>
          <div class="rec-card-value" style="color:${lateColor};font-size:17px">${fmtDate(rec.orderBy)}</div>
          <div class="rec-card-sub">${p.deliveryDays} Tage Vorlauf</div>
        </div>
        <div class="rec-card">
          <div class="rec-card-label">Ware ankommen bis</div>
          <div class="rec-card-value" style="color:#34d399;font-size:17px">${fmtDate(rec.arrivalBy)}</div>
          <div class="rec-card-sub">${rec.firstOOSMonth?`Sonst OOS in ${rec.firstOOSMonth}`:"Sonst Puffer aufgebraucht"}</div>
        </div>
      </div>
    </div>`;
  } else {
    recHTML=`<div class="rec-box ok">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:20px">✅</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:#86efac;margin-bottom:3px">Kein Handlungsbedarf</div>
          <div style="font-size:12px;color:#4ade80">Bestand reicht durch den gesamten Zeitraum inkl. ${SAFETY_DAYS}-Tage-Puffer.
          Restbestand Dez: <strong>${rows[5].end.toLocaleString("de-DE")} Units</strong>.</div>
        </div>
      </div>
    </div>`;
  }

  // Tabs
  const tabsHTML = products.map(pr=>{
    const prRows = calcFlow(pr,multipliers[pr.id]);
    const prRec  = calcRec(pr,multipliers[pr.id]);
    const prOOS  = prRows.some(r=>r.oos);
    const dotC   = prOOS?"var(--red)":prRec.reason==="buffer"?"var(--yellow)":"var(--green)";
    const isAct  = pr.id===activeId;
    return `<div class="tab ${isAct?'active':''}" onclick="setActive('${pr.id}')">
      <span class="tab-dot" style="background:${dotC}"></span>${pr.label}
    </div>`;
  }).join("");

  // Multiplier inputs
  const multGridHTML = MONTH_KEYS.map((mk,i)=>{
    const v=mults[mk]??1.0;
    return `<div class="mult-col">
      <div class="mult-month-label ${i>=3?'q4':''}">${MONTHS[i]}</div>
      <div class="mult-input-wrap">
        <input class="mult-input ${v>1.3?'hot':''}" type="number" min="0.1" max="5" step="0.1"
          value="${v.toFixed(1)}" data-mk="${mk}"
          oninput="updateMult('${p.id}','${mk}',this.value);this.className='mult-input'+(parseFloat(this.value)>1.3?' hot':'')">
        <span class="mult-x">×</span>
      </div>
    </div>`;
  }).join("");

  app.innerHTML=`
    <div class="tabs">${tabsHTML}</div>
    <div class="info-bar">
      <div class="info-cell"><div class="info-label">Bestand heute</div><div class="info-value">${p.currentStock.toLocaleString("de-DE")}</div></div>
      <div class="info-cell"><div class="info-label">Basis VK/Tag</div><div class="info-value">${p.baseVK}</div></div>
      <div class="info-cell"><div class="info-label">Lieferzeit</div><div class="info-value">${p.deliveryDays}T</div></div>
      ${poCells}
      <div class="info-cell"><div class="info-label">Q4 Mehrverkauf</div><div class="info-value yellow">+${q4Extra.toLocaleString("de-DE")}</div></div>
    </div>
    <div class="mult-section">
      <div class="mult-header">
        <div class="mult-title">Sales-Multiplikatoren</div>
        <button class="reset-btn" onclick="resetMults('${p.id}')">↩ Reset</button>
      </div>
      <div class="mult-grid">${multGridHTML}</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Monat</th><th>×Faktor</th><th>VK/Monat</th><th>PO-Zugang</th><th>Start</th><th>Ende</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    ${recHTML}
    <div class="footer-note">Alle POs im Sheet gelten als ausstehend · ETAs in der Vergangenheit werden als Juli-Zugang gewertet · VK/Tag × Mult × 30 = monatlicher Abverkauf</div>
  `;
}

function setActive(id){ activeId=id; render(); }
function updateMult(productId,mk,val){ const v=parseFloat(val); if(isNaN(v)||v<=0)return; multipliers[productId][mk]=v; render(); }
function resetMults(productId){ multipliers[productId]={...DEFAULT_MULTS[productId]}; render(); }

loadData();
</script>
</body>
</html>
